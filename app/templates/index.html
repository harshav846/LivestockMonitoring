<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Livestock Monitoring</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="{{ url_for('static', filename='videos/cattle_eating.mp4') }}"
                type="video/mp4">
    </video>

    <div class="overlay">
        <div class="glass-panel">
            <h1>Smart Livestock Monitoring</h1>
            <p>Next-generation AI tracking and security for precision farming.</p>

            <div class="hero-features">
                <div class="feature-item">
                    <i class="fas fa-microchip"></i>
                    <span>AI Tracking</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>Zone Security</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-envelope-open-text"></i>
                    <span>Smart Alerts</span>
                </div>
            </div>

            <div class="buttons">
                <a href="/owner_login" class="btn">Owner Login</a>
                <a href="/owner_register" class="btn secondary">Register Farm</a>
            </div>
        </div>
    </div>

</body>
</html>
